<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reverse-Ollama Session Export</title>
  <style>
    :root {
      --accent: #8abeb7;
      --border: #5f87ff;
      --borderAccent: #00d7ff;
      --borderMuted: #505050;
      --success: #b5bd68;
      --error: #cc6666;
      --warning: #f0c674;
      --muted: #808080;
      --dim: #666666;
      --text: #e5e5e7;
      --thinkingText: #808080;
      --selectedBg: #3a3a4a;
      --userMessageBg: #343541;
      --userMessageText: #e5e5e7;
      --customMessageBg: #2d2838;
      --customMessageText: #e5e5e7;
      --customMessageLabel: #9575cd;
      --toolPendingBg: #282832;
      --toolSuccessBg: #283228;
      --toolErrorBg: #3c2828;
      --toolTitle: #e5e5e7;
      --toolOutput: #808080;
      --mdHeading: #f0c674;
      --mdLink: #81a2be;
      --mdCode: #8abeb7;
      --mdCodeBlock: #b5bd68;
      --mdCodeBlockBorder: #808080;
      --mdQuote: #808080;
      --mdQuoteBorder: #808080;
      --mdHr: #808080;
      --mdListBullet: #8abeb7;
      --body-bg: rgb(36, 37, 46);
      --container-bg: rgb(44, 45, 55);
      --info-bg: rgb(72, 68, 65);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --line-height: 18px;
      --content-line-height: 1.35;
      --content-paragraph-gap: 3px;
      --content-block-gap: 8px;
    }

    body {
      font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace;
      font-size: 12px;
      line-height: var(--content-line-height);
      color: var(--text);
      background: var(--body-bg);
    }

    #app {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    #sidebar {
      width: 400px;
      background: var(--container-bg);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 1px solid var(--dim);
    }

    .sidebar-header {
      padding: 8px 12px;
      flex-shrink: 0;
    }

    .sidebar-controls {
      padding: 8px 8px 4px 8px;
    }

    .sidebar-search {
      width: 100%;
      box-sizing: border-box;
      padding: 4px 8px;
      font-size: 11px;
      font-family: inherit;
      background: var(--body-bg);
      color: var(--text);
      border: 1px solid var(--dim);
      border-radius: 3px;
    }

    .sidebar-search:focus {
      outline: none;
      border-color: var(--accent);
    }

    .sidebar-search::placeholder {
      color: var(--muted);
    }

    .tree-container {
      flex: 1;
      overflow: auto;
      padding: 4px 0;
    }

    .tree-node {
      padding: 0 8px;
      cursor: pointer;
      display: flex;
      align-items: baseline;
      font-size: 11px;
      line-height: 13px;
      white-space: nowrap;
    }

    .tree-node:hover {
      background: var(--selectedBg);
    }

    .tree-node.active {
      background: var(--selectedBg);
    }

    .tree-node.active .tree-content {
      font-weight: bold;
    }

    .tree-prefix {
      color: var(--muted);
      flex-shrink: 0;
      font-family: monospace;
      white-space: pre;
    }

    .tree-marker {
      color: var(--accent);
      flex-shrink: 0;
    }

    .tree-content {
      color: var(--text);
    }

    .tree-role-user {
      color: var(--accent);
    }

    .tree-role-assistant {
      color: var(--success);
    }

    .tree-role-reasoning {
      color: var(--warning);
      font-style: italic;
    }

    .tree-muted {
      color: var(--muted);
    }

    .tree-error {
      color: var(--error);
    }

    .tree-model {
      color: var(--borderAccent);
    }

    .tree-proxy {
      color: var(--customMessageLabel);
    }

    .tree-status {
      padding: 4px 12px;
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* Main content */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: var(--line-height) calc(var(--line-height) * 2);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #content > * {
      width: 100%;
      max-width: 900px;
    }

    /* Help bar */
    .help-bar {
      font-size: 11px;
      color: var(--warning);
      margin-bottom: var(--line-height);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .file-input-label {
      font-size: 10px;
      padding: 2px 8px;
      background: var(--container-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
    }

    .file-input-label:hover {
      background: var(--selectedBg);
      border-color: var(--borderAccent);
    }

    #file-input {
      display: none;
    }

    /* Header */
    .header {
      background: var(--container-bg);
      border-radius: 4px;
      padding: var(--line-height);
      margin-bottom: var(--line-height);
    }

    .header h1 {
      font-size: 12px;
      font-weight: bold;
      color: var(--borderAccent);
      margin-bottom: var(--line-height);
    }

    .header-info {
      display: flex;
      flex-direction: column;
      gap: 0;
      font-size: 11px;
    }

    .info-item {
      color: var(--dim);
      display: flex;
      align-items: baseline;
    }

    .info-label {
      font-weight: 600;
      margin-right: 8px;
      min-width: 100px;
    }

    .info-value {
      color: var(--text);
      flex: 1;
      word-break: break-all;
    }

    /* Messages */
    #messages {
      display: flex;
      flex-direction: column;
      gap: var(--line-height);
    }

    .message-timestamp {
      font-size: 10px;
      color: var(--dim);
      opacity: 0.8;
    }

    .user-message {
      background: var(--userMessageBg);
      color: var(--userMessageText);
      padding: var(--line-height);
      border-radius: 4px;
      position: relative;
    }

    .reasoning-message {
      background: var(--info-bg);
      color: var(--thinkingText);
      padding: var(--line-height);
      border-radius: 4px;
      position: relative;
      font-style: italic;
      border-left: 3px solid var(--warning);
    }

    .assistant-message {
      padding: 0;
      position: relative;
    }

    .assistant-text {
      padding: var(--line-height);
      padding-bottom: 0;
    }

    .thinking-text {
      padding: var(--line-height);
      color: var(--thinkingText);
      font-style: italic;
      white-space: pre-wrap;
    }

    /* Tool executions (pi-style) */
    .tool-execution {
      padding: 6px 8px;
      margin: 8px 0;
      border-radius: 3px;
      font-size: 11px;
    }

    .tool-execution + .tool-execution {
      margin-top: 0;
    }

    .assistant-text + .tool-execution {
      margin-top: 8px;
    }

    .tool-execution.pending { background: var(--toolPendingBg); }
    .tool-execution.success { background: var(--toolSuccessBg); }
    .tool-execution.error { background: var(--toolErrorBg); }

    .tool-header {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .tool-name {
      font-weight: bold;
      color: var(--warning);
    }

    .tool-path {
      color: var(--accent);
    }

    .tool-path .line-numbers {
      color: var(--warning);
    }

    .line-count {
      color: var(--muted);
      font-size: 10px;
    }

    .tool-output {
      margin-top: 6px;
      padding: 6px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 3px;
    }

    .tool-output pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: inherit;
      font-size: 10px;
      line-height: 14px;
    }

    .tool-output > div {
      padding: 0;
      line-height: 14px;
    }

    .expand-hint {
      color: var(--muted);
      font-style: italic;
      padding-top: 4px;
    }

    .tool-diff {
      margin-top: 6px;
      font-size: 10px;
      line-height: 14px;
    }

    .tool-diff .diff-added { color: var(--success); }
    .tool-diff .diff-removed { color: var(--error); }
    .tool-diff .diff-context { color: var(--muted); }

    .tool-error {
      color: var(--error);
    }

    .error-text {
      color: var(--error);
      padding: 8px;
      font-size: 11px;
    }

    /* Proxy metadata block */
    .proxy-block {
      background: var(--customMessageBg);
      border-radius: 4px;
      padding: var(--line-height);
      margin-top: var(--line-height);
    }

    .proxy-block-header {
      font-weight: bold;
      color: var(--customMessageLabel);
      margin-bottom: var(--line-height);
    }

    .proxy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 8px;
    }

    .proxy-item {
      font-size: 11px;
    }

    .proxy-item-label {
      color: var(--dim);
      font-size: 10px;
    }

    .proxy-item-value {
      color: var(--text);
    }

    .proxy-item-value.success {
      color: var(--success);
    }

    .proxy-item-value.error {
      color: var(--error);
    }

    .proxy-item-value.warning {
      color: var(--warning);
    }

    /* Code blocks for bodies */
    .body-block {
      margin-top: var(--line-height);
    }

    .body-block-header {
      font-weight: bold;
      color: var(--warning);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .body-block pre {
      background: var(--body-bg);
      padding: 8px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 10px;
      line-height: 14px;
      max-height: 300px;
      overflow-y: auto;
    }

    .body-block code {
      font-family: inherit;
      color: var(--text);
    }

    /* Model change */
    .model-change {
      padding: 0 var(--line-height);
      color: var(--dim);
      font-size: 11px;
      margin-bottom: var(--line-height);
    }

    .model-name {
      color: var(--borderAccent);
      font-weight: bold;
    }

    /* Error block */
    .error-block {
      background: var(--toolErrorBg);
      padding: var(--line-height);
      border-radius: 4px;
      border-left: 3px solid var(--error);
    }

    .error-block-header {
      font-weight: bold;
      color: var(--error);
    }

    .error-block-message {
      color: var(--text);
      margin-top: 4px;
    }

    /* Markdown content */
    .markdown-content {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: var(--content-line-height);
    }

    .markdown-content h1,
    .markdown-content h2,
    .markdown-content h3,
    .markdown-content h4,
    .markdown-content h5,
    .markdown-content h6 {
      color: var(--mdHeading);
      margin: var(--content-block-gap) 0 0 0;
      font-weight: bold;
      line-height: 1.25;
    }

    .markdown-content h1 { font-size: 1em; }
    .markdown-content h2 { font-size: 1em; }
    .markdown-content h3 { font-size: 1em; }

    .markdown-content p { margin: 0; }
    .markdown-content p + p { margin-top: var(--content-paragraph-gap); }

    .markdown-content code {
      background: rgba(128, 128, 128, 0.2);
      color: var(--mdCode);
      padding: 0 4px;
      border-radius: 3px;
      font-family: inherit;
    }

    .markdown-content pre {
      background: transparent;
      margin: var(--content-block-gap) 0;
      overflow-x: auto;
    }

    .markdown-content pre code {
      display: block;
      background: none;
      color: var(--text);
    }

    .markdown-content blockquote {
      border-left: 3px solid var(--mdQuoteBorder);
      padding-left: 12px;
      margin: var(--content-block-gap) 0;
      color: var(--mdQuote);
      font-style: italic;
    }

    .markdown-content ul,
    .markdown-content ol {
      margin: var(--content-block-gap) 0;
      padding-left: 18px;
    }

    .markdown-content li { margin: 0; }
    .markdown-content li::marker { color: var(--mdListBullet); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--muted);
    }

    .empty-state h2 {
      color: var(--text);
      margin-bottom: 16px;
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      padding: 20px;
      text-align: center;
      color: var(--dim);
      font-size: 10px;
    }

    /* Mobile */
    #hamburger {
      display: none;
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 100;
      padding: 3px 8px;
      font-size: 12px;
      font-family: inherit;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--dim);
      border-radius: 3px;
      cursor: pointer;
    }

    #hamburger:hover {
      color: var(--text);
      border-color: var(--text);
    }

    #sidebar-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 98;
    }

    @media (max-width: 900px) {
      #sidebar {
        position: fixed;
        left: -400px;
        width: 400px;
        top: 0;
        bottom: 0;
        height: 100vh;
        z-index: 99;
        transition: left 0.3s;
      }

      #sidebar.open {
        left: 0;
      }

      #sidebar-overlay.open {
        display: block;
      }

      #hamburger {
        display: block;
      }

      #content {
        padding: var(--line-height) 16px;
      }

      #content > * {
        max-width: 100%;
      }
    }

    @media print {
      #sidebar, #hamburger, #sidebar-overlay { display: none !important; }
      body { background: white; color: black; }
      #content { max-width: none; }
    }
  </style>
</head>
<body>
  <button id="hamburger" title="Open sidebar">☰</button>
  <div id="sidebar-overlay"></div>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-controls">
          <input type="text" class="sidebar-search" id="tree-search" placeholder="Search...">
        </div>
      </div>
      <div class="tree-container" id="tree-container"></div>
      <div class="tree-status" id="tree-status"></div>
    </aside>
    <main id="content">
      <div id="header-container"></div>
      <div id="messages"></div>
    </main>
  </div>

  <script>
    // State
    let sessions = [];
    let activeSessionIndex = 0;
    let activeEntryId = null;

    // DOM elements
    const treeContainer = document.getElementById('tree-container');
    const treeStatus = document.getElementById('tree-status');
    const headerContainer = document.getElementById('header-container');
    const messagesContainer = document.getElementById('messages');
    const searchInput = document.getElementById('tree-search');
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');

    // File input handling
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.id = 'file-input';
    fileInput.accept = '.jsonl,.json';
    fileInput.multiple = true;

    fileInput.addEventListener('change', (e) => {
      const files = Array.from(e.target.files);
      loadFiles(files);
    });

    // Event listeners
    hamburger.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('open');
    });

    sidebarOverlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    });

    searchInput.addEventListener('input', (e) => {
      renderTree(e.target.value);
    });

    // Load files
    async function loadFiles(files) {
      sessions = [];

      for (const file of files) {
        const text = await file.text();

        // Try parsing as JSONL (multiple sessions)
        const lines = text.trim().split('\n');
        for (const line of lines) {
          if (line.trim()) {
            try {
              const session = JSON.parse(line);
              sessions.push(session);
            } catch (err) {
              console.warn('Failed to parse line:', err);
            }
          }
        }
      }

      if (sessions.length > 0) {
        activeSessionIndex = 0;
        render();
      }
    }

    // Render functions
    function render() {
      renderTree(searchInput.value);
      renderHeader();
      renderMessages();
      updateStatus();
    }

    function renderTree(filter = '') {
      const filterLower = filter.toLowerCase();

      let html = '';

      sessions.forEach((session, sessionIndex) => {
        const isActive = sessionIndex === activeSessionIndex;

        // Session header
        const sessionTime = session.header?.timestamp || session._proxy?.timestamp || 'Unknown';
        const sessionSource = session._proxy?.source || 'unknown';
        const sessionPath = session._proxy?.path || session.header?.cwd || '';

        html += `<div class="tree-node ${isActive ? 'active' : ''}" data-session="${sessionIndex}">
          <span class="tree-prefix"></span>
          <span class="tree-marker">${isActive ? '●' : '○'}</span>
          <span class="tree-content tree-proxy">
            Session ${sessionIndex + 1} - ${escapeHtml(sessionSource)}
          </span>
        </div>`;

        if (isActive) {
          // Entries
          session.entries?.forEach((entry, entryIndex) => {
            const entryText = getEntryTreeText(entry);
            const matchesFilter = !filter || entryText.toLowerCase().includes(filterLower);

            if (matchesFilter) {
              const entryClass = entry.type === 'message'
                ? (entry.message?.role === 'user' ? 'tree-role-user' : entry.message?.role === 'reasoning' ? 'tree-role-reasoning' : 'tree-role-assistant')
                : entry.type === 'error' ? 'tree-error'
                : entry.type === 'model_change' ? 'tree-model'
                : '';

              html += `<div class="tree-node ${activeEntryId === entry.id ? 'active' : ''}"
                          data-entry="${entry.id}"
                          data-session="${sessionIndex}">
                <span class="tree-prefix">  </span>
                <span class="tree-marker">├</span>
                <span class="tree-content ${entryClass}">${escapeHtml(entryText)}</span>
              </div>`;
            }
          });
        }
      });

      if (sessions.length === 0) {
        html = `<div class="empty-state" style="padding: 20px; text-align: left;">
          <p>No sessions loaded.</p>
          <p style="margin-top: 8px;">
            <label class="file-input-label" style="display: inline-block; padding: 4px 12px;">
              Load session file...
              <input type="file" id="file-input-trigger" accept=".jsonl,.json" multiple style="display: none;">
            </label>
          </p>
        </div>`;
      }

      treeContainer.innerHTML = html;

      // Add click handlers
      treeContainer.querySelectorAll('.tree-node').forEach(node => {
        node.addEventListener('click', () => {
          const sessionIdx = node.dataset.session;
          const entryId = node.dataset.entry;

          if (entryId) {
            activeEntryId = entryId;
            // Scroll to entry
            const el = document.getElementById(`entry-${entryId}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          } else {
            activeSessionIndex = parseInt(sessionIdx);
            activeEntryId = null;
          }

          render();
        });
      });

      // Handle file input in empty state
      const fileInputTrigger = document.getElementById('file-input-trigger');
      if (fileInputTrigger) {
        fileInputTrigger.addEventListener('change', (e) => {
          loadFiles(Array.from(e.target.files));
        });
      }
    }

    function getEntryTreeText(entry) {
      switch (entry.type) {
        case 'model_change':
          return `Model: ${entry.modelId || 'unknown'}`;
        case 'message':
          const role = entry.message?.role || 'unknown';
          const content = entry.message?.content;
          const toolCalls = entry.message?.tool_calls;
          const reasoning = entry.message?.reasoning;
          let preview = '';

          // Build preview from reasoning, content text, or tool calls
          if (reasoning) {
            preview = reasoning;
          } else if (Array.isArray(content)) {
            const textPart = content.find(c => c.type === 'text');
            preview = textPart?.text || '';
          } else {
            preview = String(content || '');
          }

          // If no text content but has tool calls, show tool names
          if (!preview && Array.isArray(toolCalls) && toolCalls.length > 0) {
            const toolNames = toolCalls.map(tc => tc.function?.name || tc.name || 'tool').join(', ');
            preview = `[tools: ${toolNames}]`;
          }

          const truncated = preview.length > 40 ? preview.slice(0, 40) + '...' : preview;
          const roleLabel = role === 'reasoning' ? 'Reasoning' : role;
          return `${roleLabel}: ${truncated}`;
        case 'error':
          return `Error: ${entry.error?.message || 'unknown'}`;
        default:
          return entry.type || 'unknown';
      }
    }

    function renderHeader() {
      if (sessions.length === 0) {
        headerContainer.innerHTML = `
          <div class="help-bar">
            <label class="file-input-label">
              Load session file...
            </label>
            <input type="file" id="header-file-input" accept=".jsonl,.json" multiple style="display: none;">
          </div>
          <div class="header">
            <h1>Reverse-Ollama Session Viewer</h1>
            <p style="color: var(--muted);">Load a session JSONL file to view request/response pairs in pi-compatible format.</p>
          </div>
        `;

        const headerFileInput = document.getElementById('header-file-input');
        if (headerFileInput) {
          headerFileInput.addEventListener('change', (e) => {
            loadFiles(Array.from(e.target.files));
          });
        }

        // Also trigger on label click
        const label = headerContainer.querySelector('.file-input-label');
        if (label) {
          label.addEventListener('click', () => {
            const input = document.getElementById('header-file-input');
            input.click();
          });
        }

        return;
      }

      const session = sessions[activeSessionIndex];
      const proxy = session._proxy || {};
      const header = session.header || {};

      headerContainer.innerHTML = `
        <div class="help-bar">
          <span>${sessions.length} session(s) loaded</span>
          <label class="file-input-label">
            Load more...
          </label>
          <input type="file" id="header-file-input" accept=".jsonl,.json" multiple style="display: none;">
          ${sessions.length > 1 ? `
            <button onclick="prevSession()" style="margin-left: auto; padding: 2px 8px; background: var(--container-bg); border: 1px solid var(--dim); border-radius: 3px; color: var(--text); cursor: pointer; font-family: inherit; font-size: 10px;">← Prev</button>
            <span style="font-size: 10px; color: var(--muted);">${activeSessionIndex + 1}/${sessions.length}</span>
            <button onclick="nextSession()" style="padding: 2px 8px; background: var(--container-bg); border: 1px solid var(--dim); border-radius: 3px; color: var(--text); cursor: pointer; font-family: inherit; font-size: 10px;">Next →</button>
          ` : ''}
        </div>
        <div class="header">
          <h1>Session ${activeSessionIndex + 1}</h1>
          <div class="header-info">
            <div class="info-item">
              <span class="info-label">ID:</span>
              <span class="info-value">${escapeHtml(header.id || 'unknown')}</span>
            </div>
            <div class="info-item">
              <span class="info-label">Timestamp:</span>
              <span class="info-value">${escapeHtml(header.timestamp || proxy.timestamp || 'unknown')}</span>
            </div>
            <div class="info-item">
              <span class="info-label">Source:</span>
              <span class="info-value">${escapeHtml(proxy.source || 'unknown')}</span>
            </div>
            <div class="info-item">
              <span class="info-label">Path:</span>
              <span class="info-value">${escapeHtml(proxy.method || '')} ${escapeHtml(proxy.path || 'unknown')}</span>
            </div>
            <div class="info-item">
              <span class="info-label">Category:</span>
              <span class="info-value">${escapeHtml(proxy.matchedCategory || 'none')}</span>
            </div>
            <div class="info-item">
              <span class="info-label">Actions:</span>
              <span class="info-value">${(proxy.appliedActions || []).map(a => escapeHtml(a)).join(', ') || 'none'}</span>
            </div>
            <div class="info-item">
              <span class="info-label">Status:</span>
              <span class="info-value ${proxy.statusCode >= 400 ? 'error' : proxy.statusCode >= 300 ? 'warning' : 'success'}">${proxy.statusCode || 'unknown'}</span>
            </div>
          </div>
        </div>
      `;

      const headerFileInput = document.getElementById('header-file-input');
      if (headerFileInput) {
        const label = headerContainer.querySelector('.file-input-label');
        label.addEventListener('click', () => headerFileInput.click());
        headerFileInput.addEventListener('change', (e) => {
          loadFiles(Array.from(e.target.files));
        });
      }
    }

    // Build tool call lookup (toolCallId -> {name, arguments})
    function buildToolCallMap(entries) {
      const map = new Map();
      for (const entry of entries) {
        if (entry.type === 'message' && entry.message?.role === 'assistant') {
          const content = entry.message.content;
          if (Array.isArray(content)) {
            for (const block of content) {
              if (block.type === 'toolCall') {
                map.set(block.id, { name: block.name, arguments: block.arguments });
              }
            }
          }
          // Also check tool_calls at message level
          if (Array.isArray(entry.message.tool_calls)) {
            for (const tc of entry.message.tool_calls) {
              const args = tc.function?.arguments || tc.arguments || '{}';
              map.set(tc.id, { name: tc.function?.name || tc.name, arguments: args });
            }
          }
        }
      }
      return map;
    }

    // Find tool result for a tool call ID
    function findToolResult(entries, toolCallId) {
      for (const entry of entries) {
        if (entry.type === 'message' && entry.message?.role === 'toolResult') {
          if (entry.message.toolCallId === toolCallId) {
            return entry.message;
          }
        }
      }
      return null;
    }

    // Render a tool execution (call + optional result) in pi style
    function renderToolExecution(tc, entries) {
      const result = findToolResult(entries, tc.id);
      const isError = result?.isError || false;
      const statusClass = result ? (isError ? 'error' : 'success') : 'pending';
      const args = tc.arguments || {};
      const name = tc.name || 'unknown';

      // Get result text
      const getResultText = () => {
        if (!result) return '';
        const textBlocks = (result.content || []).filter(c => c.type === 'text');
        return textBlocks.map(c => c.text || '').join('\n');
      };

      let html = `<div class="tool-execution ${statusClass}">`;

      // Render based on tool name (like pi template.js)
      if (name === 'bash') {
        const command = args.command || '';
        const timeout = args.timeout;
        const timeoutSuffix = timeout ? ` (timeout ${timeout}s)` : '';
        html += `<div class="tool-header"><span class="tool-name">bash</span> <span class="tool-path">$ ${escapeHtml(command || '...')}${timeoutSuffix}</span></div>`;
        if (result) {
          const output = getResultText().trim();
          if (output) {
            const lines = output.split('\n');
            const maxLines = 5;
            const displayLines = lines.slice(0, maxLines);
            const remaining = lines.length - maxLines;
            html += '<div class="tool-output">';
            for (const line of displayLines) {
              html += `<div>${escapeHtml(line)}</div>`;
            }
            if (remaining > 0) {
              html += `<div class="expand-hint">... (${remaining} more lines)</div>`;
            }
            html += '</div>';
          }
        }
      } else if (name === 'read') {
        const path = args.file_path || args.path || '';
        const offset = args.offset;
        const limit = args.limit;
        let pathDisplay = path;
        if (offset !== undefined || limit !== undefined) {
          const start = offset ?? 1;
          const end = limit !== undefined ? start + limit - 1 : '';
          pathDisplay += `:${start}${end ? '-' + end : ''}`;
        }
        html += `<div class="tool-header"><span class="tool-name">read</span> <span class="tool-path">${escapeHtml(pathDisplay)}</span></div>`;
        if (result) {
          const output = getResultText();
          if (output) {
            html += '<div class="tool-output"><pre>' + escapeHtml(output) + '</pre></div>';
          }
        }
      } else if (name === 'write') {
        const path = args.file_path || args.path || '';
        const content = args.content || '';
        const lineCount = content.split('\n').length;
        html += `<div class="tool-header"><span class="tool-name">write</span> <span class="tool-path">${escapeHtml(path)}</span>`;
        if (lineCount > 1) {
          html += ` <span class="line-count">(${lineCount} lines)</span>`;
        }
        html += '</div>';
        if (content) {
          html += '<div class="tool-output"><pre>' + escapeHtml(content) + '</pre></div>';
        }
      } else if (name === 'edit') {
        const path = args.file_path || args.path || '';
        html += `<div class="tool-header"><span class="tool-name">edit</span> <span class="tool-path">${escapeHtml(path)}</span></div>`;
        // Show diff if available
        if (result?.details?.diff) {
          const diffLines = result.details.diff.split('\n');
          html += '<div class="tool-diff">';
          for (const line of diffLines) {
            const cls = line.match(/^\+/) ? 'diff-added' : line.match(/^-/) ? 'diff-removed' : 'diff-context';
            html += `<div class="${cls}">${escapeHtml(line)}</div>`;
          }
          html += '</div>';
        } else if (result) {
          const output = getResultText().trim();
          if (output) {
            html += '<div class="tool-output"><pre>' + escapeHtml(output) + '</pre></div>';
          }
        }
      } else if (name === 'ls' || name === 'find' || name === 'grep') {
        const path = args.path || '.';
        const pattern = args.pattern || args.glob || '';
        html += `<div class="tool-header"><span class="tool-name">${name}</span> <span class="tool-path">${escapeHtml(pattern ? `${pattern} in ${path}` : path)}</span></div>`;
        if (result) {
          const output = getResultText().trim();
          if (output) {
            const lines = output.split('\n');
            const maxLines = 20;
            html += '<div class="tool-output">';
            for (let i = 0; i < Math.min(lines.length, maxLines); i++) {
              html += `<div>${escapeHtml(lines[i])}</div>`;
            }
            if (lines.length > maxLines) {
              html += `<div class="expand-hint">... (${lines.length - maxLines} more lines)</div>`;
            }
            html += '</div>';
          }
        }
      } else {
        // Generic tool
        html += `<div class="tool-header"><span class="tool-name">${escapeHtml(name)}</span></div>`;
        html += '<div class="tool-output"><pre>' + escapeHtml(JSON.stringify(args, null, 2)) + '</pre></div>';
        if (result) {
          const output = getResultText();
          if (output) {
            html += '<div class="tool-output"><pre>' + escapeHtml(output) + '</pre></div>';
          }
        }
      }

      html += '</div>';
      return html;
    }

    function renderMessages() {
      if (sessions.length === 0) {
        messagesContainer.innerHTML = '';
        return;
      }

      const session = sessions[activeSessionIndex];
      const proxy = session._proxy || {};
      const entries = session.entries || [];

      // Build tool call lookup
      const toolCallMap = buildToolCallMap(entries);

      let html = '';

      // Render entries
      entries.forEach((entry) => {
        if (entry.type === 'model_change') {
          html += `
            <div class="model-change" id="entry-${entry.id}">
              Model changed to: <span class="model-name">${escapeHtml(entry.modelId || 'unknown')}</span>
            </div>
          `;
        } else if (entry.type === 'message') {
          const role = entry.message?.role;
          const content = entry.message?.content;
          const usage = entry.message?.usage;
          const model = entry.message?.model;

          if (role === 'user') {
            let contentHtml = '';
            if (Array.isArray(content)) {
              content.forEach(part => {
                if (part.type === 'text') {
                  contentHtml += `<div class="markdown-content">${escapeHtml(part.text || '')}</div>`;
                }
              });
            } else {
              contentHtml = `<div class="markdown-content">${escapeHtml(String(content || ''))}</div>`;
            }
            html += `<div class="user-message" id="entry-${entry.id}">${contentHtml}</div>`;
          } else if (role === 'reasoning') {
            let contentHtml = '';
            if (Array.isArray(content)) {
              content.forEach(part => {
                if (part.type === 'thinking') {
                  contentHtml += `<div class="thinking-text">${escapeHtml(part.thinking || '')}</div>`;
                } else if (part.type === 'text') {
                  contentHtml += `<div class="markdown-content">${escapeHtml(part.text || '')}</div>`;
                }
              });
            }
            html += `<div class="reasoning-message" id="entry-${entry.id}">${contentHtml}</div>`;
          } else if (role === 'assistant') {
            html += `<div class="assistant-message" id="entry-${entry.id}">`;

            // Check for reasoning field at message level
            const reasoningText = entry.message?.reasoning;
            if (reasoningText) {
              html += `<div class="thinking-text">${escapeHtml(reasoningText)}</div>`;
            }

            // Render text and thinking content first
            let hasTextContent = false;
            if (Array.isArray(content)) {
              content.forEach(part => {
                if (part.type === 'text' && part.text?.trim()) {
                  hasTextContent = true;
                  html += `<div class="assistant-text markdown-content">${escapeHtml(part.text)}</div>`;
                } else if (part.type === 'thinking' && part.thinking?.trim()) {
                  hasTextContent = true;
                  html += `<div class="thinking-text">${escapeHtml(part.thinking)}</div>`;
                }
              });
            } else if (content && String(content).trim()) {
              hasTextContent = true;
              html += `<div class="assistant-text markdown-content">${escapeHtml(String(content))}</div>`;
            }

            // Render tool calls (from content array)
            if (Array.isArray(content)) {
              content.forEach(part => {
                if (part.type === 'toolCall') {
                  html += renderToolExecution(part, entries);
                }
              });
            }

            // Also check tool_calls at message level (OpenAI format)
            if (Array.isArray(entry.message?.tool_calls)) {
              entry.message.tool_calls.forEach(tc => {
                const args = tc.function?.arguments || tc.arguments || '{}';
                html += renderToolExecution({
                  id: tc.id,
                  name: tc.function?.name || tc.name,
                  arguments: typeof args === 'string' ? JSON.parse(args) : args
                }, entries);
              });
            }

            // Show error/aborted status
            if (entry.message?.stopReason === 'aborted') {
              html += '<div class="error-text">Aborted</div>';
            } else if (entry.message?.stopReason === 'error') {
              html += `<div class="error-text">Error: ${escapeHtml(entry.message?.errorMessage || 'Unknown error')}</div>`;
            }

            // Usage and model info
            if (usage) {
              html += `<div style="padding: 0 var(--line-height); font-size: 10px; color: var(--dim); margin-top: 4px;">
                Tokens: ${usage.input || usage.prompt_tokens || 0} in / ${usage.output || usage.completion_tokens || 0} out
                ${usage.totalTokens ? `(${usage.totalTokens} total)` : ''}
              </div>`;
            }
            if (model) {
              html += `<div style="padding: 0 var(--line-height); font-size: 10px; color: var(--dim);">Model: ${escapeHtml(model)}</div>`;
            }

            html += '</div>';
          } else if (role === 'toolResult') {
            // Tool results are rendered inline with their tool calls, skip here
            // But if we don't have a matching tool call, show it anyway
            const toolCallId = entry.message?.toolCallId;
            if (toolCallId && !toolCallMap.has(toolCallId)) {
              const isError = entry.message?.isError;
              const statusClass = isError ? 'error' : 'success';
              const toolName = entry.message?.toolName || 'tool';
              html += `<div class="tool-execution ${statusClass}" id="entry-${entry.id}">`;
              html += `<div class="tool-header"><span class="tool-name">${escapeHtml(toolName)}</span> <span class="tool-path">(orphaned result)</span></div>`;
              const content = entry.message?.content || [];
              const textBlocks = content.filter(c => c.type === 'text');
              if (textBlocks.length > 0) {
                html += '<div class="tool-output"><pre>' + escapeHtml(textBlocks.map(c => c.text || '').join('\n')) + '</pre></div>';
              }
              html += '</div>';
            }
          }
        } else if (entry.type === 'error') {
          html += `
            <div class="error-block" id="entry-${entry.id}">
              <div class="error-block-header">Error</div>
              <div class="error-block-message">${escapeHtml(entry.error?.message || 'Unknown error')}</div>
              ${entry.error?.statusCode ? `<div style="font-size: 10px; color: var(--muted); margin-top: 4px;">Status: ${entry.error.statusCode}</div>` : ''}
            </div>
          `;
        }
      });

      // Proxy metadata with raw bodies
      if (proxy.request || proxy.response) {
        html += `
          <div class="proxy-block">
            <div class="proxy-block-header">Request/Response Details</div>

            ${proxy.request?.incomingBody ? `
              <div class="body-block">
                <div class="body-block-header">Incoming Request Body</div>
                <pre><code>${escapeHtml(formatJson(proxy.request.incomingBody))}</code></pre>
              </div>
            ` : ''}

            ${proxy.request?.outgoingBody ? `
              <div class="body-block">
                <div class="body-block-header">Outgoing Request Body (transformed)</div>
                <pre><code>${escapeHtml(formatJson(proxy.request.outgoingBody))}</code></pre>
              </div>
            ` : ''}

            ${proxy.response?.body ? `
              <div class="body-block">
                <div class="body-block-header">Response Body</div>
                <pre><code>${escapeHtml(formatJson(proxy.response.body))}</code></pre>
              </div>
            ` : ''}
          </div>
        `;
      }

      // Footer
      html += `
        <div class="footer">
          Reverse-Ollama Session Viewer | Session ID: ${escapeHtml(session.header?.id || 'unknown')}
        </div>
      `;

      messagesContainer.innerHTML = html;
    }

    function updateStatus() {
      const session = sessions[activeSessionIndex];
      const entryCount = session?.entries?.length || 0;
      treeStatus.textContent = `${sessions.length} session(s) • ${entryCount} entries`;
    }

    function prevSession() {
      if (activeSessionIndex > 0) {
        activeSessionIndex--;
        activeEntryId = null;
        render();
      }
    }

    function nextSession() {
      if (activeSessionIndex < sessions.length - 1) {
        activeSessionIndex++;
        activeEntryId = null;
        render();
      }
    }

    // Make prev/next available globally
    window.prevSession = prevSession;
    window.nextSession = nextSession;

    // Utilities
    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatJson(str) {
      try {
        const obj = typeof str === 'string' ? JSON.parse(str) : str;
        return JSON.stringify(obj, null, 2);
      } catch {
        return String(str);
      }
    }

    // Initial render
    render();
  </script>
</body>
</html>
